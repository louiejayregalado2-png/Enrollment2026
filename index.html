<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MonCAST Enrollment</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#eef3ff;
}

.hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1');
    background-size:cover;
}

.box{
    width:100%;
    max-width:900px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.header{
    background:#003b8e;
    color:white;
    padding:30px;
    text-align:center;
}

form{
    padding:30px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.full{grid-column:1/3;}

input,select,textarea{
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    grid-column:1/3;
    padding:15px;
    border:none;
    background:#003b8e;
    color:white;
    font-size:16px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#0057d9;
}

@media(max-width:700px){
    form{grid-template-columns:1fr;}
    .full,button{grid-column:1;}
}
</style>
</head>

<body>

<div class="hero">

<div class="box">

<div class="header">
<h1>MonCAST Enrollment System</h1>
<p>Monkayo College of Arts, Sciences and Technology</p>
</div>

<form action="appointment.html">

<div>
<label>First Name</label>
<input type="text" required>
</div>

<div>
<label>Last Name</label>
<input type="text" required>
</div>

<div>
<label>Email</label>
<input type="email" required>
</div>

<div>
<label>Phone</label>
<input type="text" required>
</div>

<div>
<label>Course</label>
<select required>
<option value="">Select Course</option>
<option>BSBA Major in Marketing Management</option>
<option>BSBA Major in Human Resource Management</option>
<option>BSBA Major in Financial Management</option>
<option>Bachelor of Science in Agriculture</option>
<option>Bachelor of Agricultural Technology</option>
<option>BSED Major in English</option>
<option>BSED Major in Mathematics</option>
<option>BSED Major in Social Studies</option>
<option>Bachelor of Elementary Education</option>
</select>
</div>

<div>
<label>Year Level</label>
<select required>
<option>1st Year</option>
<option>2nd Year</option>
<option>3rd Year</option>
<option>4th Year</option>
</select>
</div>

<div class="full">
<label>Address</label>
<textarea required></textarea>
</div>

<button type="submit">Enroll Now</button>

</form>

</div>

</div>

</body>
</html>
